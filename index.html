<style media="screen and (max-width:600px)">
        /* --- 不要な要素の非表示 --- */
        .g_translation, .bogo-language-switcher, .separator, .title2, #header.container, #header {
            display:none !important;
        }

        /* --- レイアウトの基準：自然な流れにする --- */
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            background: #fff;
            display: block; /* Flexによる広がりを解除 */
        }

        /* --- メインコンテンツ --- */
        #main.container {
            padding: 0;
            width: 100%;
        }

        .front-content-wrapper {
            /* ロゴを上から離し、下の余白をフッターと近づける(40px) */
            padding: 80px 0 80px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* ロゴと言語選択の隙間 */
        }

        .mogami {
            max-width: 200px;
            height: auto;
            display: block;
        }

        /* 言語選択：縦並び */
        .language-selector {

            flex-direction: column;
            align-items: center;
            gap: 20px; /* 日本語と英語の隙間 */
        }

            height: 14px;
            width: auto;
            display: block;
            margin: 0 !important;
        }

            display: flex !important;
